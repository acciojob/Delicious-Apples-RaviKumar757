<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apple Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
        }

        /* LEFT SECTION */
        .product__photo {
            flex: 1;
        }

        .photo-container {
            text-align: center;
        }

        .photo-main img {
            width: 300px;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
        }

        .photo-album ul {
            display: flex;
            justify-content: center;
            padding: 0;
            list-style: none;
        }

        .photo-album li {
            margin: 10px;
        }

        .photo-album img {
            width: 60px;
            height: 60px;
            border-radius: 5px;
        }

        /* RIGHT SECTION */
        .product__info {
            flex: 1;
            padding: 20px;
        }

        .price {
            font-size: 28px;
            color: green;
            margin: 10px 0;
        }

        .variant ul {
            display: flex;
            list-style: none;
            padding: 0;
        }

        .variant li {
            margin-right: 10px;
        }

        .variant img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .description {
            margin-top: 20px;
        }

        .add-to-cart {
            margin-top: 20px;
        }

        .add-to-cart button {
            padding: 12px 25px;
            background-color: #e60023;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT: Product Photo -->
    <div class="product__photo">
        <div class="photo-container">

            <!-- Main Photo -->
            <div class="photo-main">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg" alt="Apple">
            </div>

            <!-- Photo Album -->
            <div class="photo-album">
                <ul>
                    <li><img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg"></li>
                    <li><img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Culinary_fruits_front_view.jpg"></li>
                    <li><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/Honeycrisp.jpg"></li>
                    <li><img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Green_Apple.jpg"></li>
                </ul>
            </div>

        </div>
    </div>

    <!-- RIGHT: Product Info -->
    <div class="product__info">
        <h1>Fresh Apples</h1>

        <!-- Price -->
        <div class="price">$7.93</div>

        <!-- Variants -->
        <div class="variant">
            <h3>Varieties</h3>
            <ul>
                <li><img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg" alt="Red"></li>
                <li><img src="https://upload.wikimedia.org/wikipedia/commons/f/f4/Honeycrisp.jpg" alt="Orange"></li>
            </ul>
        </div>

        <!-- Benefits -->
        <div class="description">
            <h3>BENEFITS</h3>
            <p>
                Apples are rich in fiber and vitamins. They help improve digestion,
                boost immunity, and support heart health. A perfect snack for a healthy lifestyle.
            </p>
        </div>

        <!-- Add to Cart -->
        <div class="add-to-cart">
            <button>ADD TO CART</button>
        </div>

    </div>

</div>

</body>
</html>
